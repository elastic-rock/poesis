<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poesis</title>
    <link href="/build.css" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_16_dark.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_16_light.png" media="(prefers-color-scheme: light)">
</head>
<body class="min-h-screen bg-neutral-900 text-white text-start">

    <div class="flex flex-wrap pt-12 w-full gap-12 px-6 sm:px-20 max-w-6xl mx-auto">
        <div id="errorPlaceholder" class="hidden w-max flex-auto h-max fade-in">
            <div class="flex flex-row items-center">
                <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="#e8eaed">
                    <path id="errorIcon" d="M248-171q-88 0-148-59T40-377q0-80 50.5-134T217-577q2-14 6.5-31.5T236-640L91-785q-9-9-9-21t9-21q9-9 21-9t21 9l707 707q9 9 9 21t-9 21q-9 9-21.5 9T797-78l-94-93H248Zm0-60h397L285-591q-11 15-14.5 34t-3.5 37h-19q-62 0-105 39.5t-43 101q0 61.5 43 105T248-231Zm216-181Zm390 210-47-47q25-17 39-38t14-50q0-43-31-73.5T755-441h-67v-81q0-88-61-147.5T478.47-729q-28.47 0-60.97 9T358-691l-42-42q36-29 77.5-42.5T478-789q111 0 190.5 79T748-520v21q72-1 122 45t50 117q0 35-16.5 73.5T854-202ZM583-470Z"/>
                </svg>
                <p id="errorText" class="ps-4 whitespace-pre-line"></p>
            </div>
            <div id="errorBtns" class="h-[76px] pt-8 flex flex-row gap-4">
                <button id="retry" class="inline-flex justify-center items-center rounded-full border-neutral-500 border-2 hover:border-white py-2 px-4">
                    <svg class="pe-1" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed">
                        <path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-70q0-17 11.5-28.5T760-800q17 0 28.5 11.5T800-760v200q0 17-11.5 28.5T760-520H560q-17 0-28.5-11.5T520-560q0-17 11.5-28.5T560-600h128q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q68 0 124.5-34.5T692-367q8-14 22.5-19.5t29.5-.5q16 5 23 21t-1 30q-41 80-117 128t-169 48Z"/>
                    </svg>
                    Retry
                </button>
            </div>
        </div>

        <div id="poemPlaceholder" class="w-max flex-auto h-max">
            <p id="title" class="text-3xl"></p>
            <p id="author" class="text-lg font-light pt-1 pb-2"></p>
            <div id="poem" class="py-4 -indent-8 ps-8"></div>
            <div class="py-2 h-[60px] flex flex-row gap-4">
                <button id="reload" class="hidden justify-center items-center rounded-full border-neutral-500 border-2 hover:border-white py-2 px-4 fade-in">
                    <svg class="pe-1" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed">
                        <path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-70q0-17 11.5-28.5T760-800q17 0 28.5 11.5T800-760v200q0 17-11.5 28.5T760-520H560q-17 0-28.5-11.5T520-560q0-17 11.5-28.5T560-600h128q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q68 0 124.5-34.5T692-367q8-14 22.5-19.5t29.5-.5q16 5 23 21t-1 30q-41 80-117 128t-169 48Z"/>
                    </svg>
                    Reload
                </button>
                <button id="share" class="hidden justify-center items-center rounded-full border-neutral-500 border-2 hover:border-white py-2 px-4 fade-in">
                    <svg class="pe-1" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed">
                        <path d="M680-80q-50 0-85-35t-35-85q0-6 3-28L282-392q-16 15-37 23.5t-45 8.5q-50 0-85-35t-35-85q0-50 35-85t85-35q24 0 45 8.5t37 23.5l281-164q-2-7-2.5-13.5T560-760q0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35q-24 0-45-8.5T598-672L317-508q2 7 2.5 13.5t.5 14.5q0 8-.5 14.5T317-452l281 164q16-15 37-23.5t45-8.5q50 0 85 35t35 85q0 50-35 85t-85 35Zm0-80q17 0 28.5-11.5T720-200q0-17-11.5-28.5T680-240q-17 0-28.5 11.5T640-200q0 17 11.5 28.5T680-160ZM200-440q17 0 28.5-11.5T240-480q0-17-11.5-28.5T200-520q-17 0-28.5 11.5T160-480q0 17 11.5 28.5T200-440Zm480-280q17 0 28.5-11.5T720-760q0-17-11.5-28.5T680-800q-17 0-28.5 11.5T640-760q0 17 11.5 28.5T680-720Zm0 520ZM200-480Zm480-280Z"/>
                    </svg>
                    Share
                </button>
            </div>
        </div>
        <div class="w-96 flex-initial">
            <div id="sidepane" class="max-w-sm hidden fade-in">
                <p class="text-xl">About Poesis</p>
                <p class="py-4">Poesis is an online collection of poems featuring works of authors from all arround the world. Be surprised by a random poem or delve into the depths of our database.</p>
            </div>
        </div>
    </div>

    <div id="shareDialog" class="hidden fixed inset-0 z-10 transition-opacity">
        <div class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center transition-opacity px-4">
            <div class="bg-neutral-900 p-6 rounded-lg shadow-lg w-full max-w-md">
                <div class="flex items-center justify-between mb-6 w-full">
                    <p class="text-lg font-semibold">Share</p>
                    <button id="shareDialogCloseButton">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed">
                            <path d="M480-424 284-228q-11 11-28 11t-28-11q-11-11-11-28t11-28l196-196-196-196q-11-11-11-28t11-28q11-11 28-11t28 11l196 196 196-196q11-11 28-11t28 11q11 11 11 28t-11 28L536-480l196 196q11 11 11 28t-11 28q-11 11-28 11t-28-11L480-424Z"/>
                        </svg>
                    </button>
                </div>
                <div class="flex items-center justify-between py-2 px-3 w-full">
                    <p id="sUrl" class="pe-8 text-ellipsis overflow-hidden whitespace-nowrap flex-1"></p>
                    <button id="shareDialogCopyButton" class="rounded-full border-neutral-500 border-2 hover:border-white py-2 px-4">
                        Copy
                    </button>
                </div>
            </div>
        </div>
    </div>
      

    <footer class="sticky top-[100vh] py-6 text-center text-neutral-600">
        <p>© 2024 David Weis</p>
    </footer>

    <script>
        const authorElement = document.getElementById("author");
        const titleElement = document.getElementById("title");
        const poemElement = document.getElementById("poem");

        const reloadBtn = document.getElementById("reload");
        const shareBtn = document.getElementById("share");
        const sidepaneElement = document.getElementById("sidepane");
        const poemPlaceholder = document.getElementById("poemPlaceholder");

        const shareDialogElement = document.getElementById("shareDialog");
        const shareDialogCloseBtn = document.getElementById("shareDialogCloseButton");
        const shareDialogCopyBtn = document.getElementById("shareDialogCopyButton");
        const sUrlElement = document.getElementById("sUrl");

        const errorPlaceholder = document.getElementById("errorPlaceholder");
        const errorText = document.getElementById("errorText");
        const errorIcon = document.getElementById("errorIcon");
        const retryBtn = document.getElementById("retry");
        const errorBtns = document.getElementById("errorBtns");

        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const shareParam = urlParams.get("share");

        function displayOfflineError() {
            errorText.textContent = "You are offline"
            errorIcon.setAttribute("d", "M260-160q-92 0-156-64T40-380q0-77 47.5-137T210-594q3-8 6-15.5t6-16.5L84-764q-11-11-11-28t11-28q11-11 28-11t28 11l680 680q11 11 11.5 27.5T820-84q-11 11-27.5 11.5T764-83l-78-77H260Zm0-80h346L284-562q-2 11-3 21t-1 21h-20q-58 0-99 41t-41 99q0 58 41 99t99 41Zm185-161Zm419 191-58-56q17-14 25.5-32.5T840-340q0-42-29-71t-71-29h-60v-80q0-83-58.5-141.5T480-720q-27 0-52 6.5T380-693l-58-58q35-24 74.5-36.5T480-800q117 0 198.5 81.5T760-520q69 8 114.5 59.5T920-340q0 39-15 72.5T864-210ZM593-479Z");
            errorBtns.classList.remove("hidden");
            poemPlaceholder.classList.add("hidden");
            errorPlaceholder.classList.remove("hidden");
        }

        function displayHTTPError(responseCode) {
            errorText.textContent = `Error ${responseCode}`
            errorIcon.setAttribute("d", "M479.98-280q14.02 0 23.52-9.48t9.5-23.5q0-14.02-9.48-23.52t-23.5-9.5q-14.02 0-23.52 9.48t-9.5 23.5q0 14.02 9.48 23.52t23.5 9.5Zm3.2-153q12.82 0 21.32-8.63 8.5-8.62 8.5-21.37v-193q0-12.75-8.68-21.38-8.67-8.62-21.5-8.62-12.82 0-21.32 8.62-8.5 8.63-8.5 21.38v193q0 12.75 8.68 21.37 8.67 8.63 21.5 8.63Zm-2.91 353q-82.74 0-155.5-31.5Q252-143 197.5-197.5t-86-127.34Q80-397.68 80-480.5t31.5-155.66Q143-709 197.5-763t127.34-85.5Q397.68-880 480.5-880t155.66 31.5Q709-817 763-763t85.5 127Q880-563 880-480.27q0 82.74-31.5 155.5Q817-252 763-197.68q-54 54.31-127 86Q563-80 480.27-80Zm.23-60Q622-140 721-239.5t99-241Q820-622 721.19-721T480-820q-141 0-240.5 98.81T140-480q0 141 99.5 240.5t241 99.5Zm-.5-340Z");
            errorBtns.classList.add("hidden");
            poemPlaceholder.classList.add("hidden");
            errorPlaceholder.classList.remove("hidden");
        }

        function setPoem(data) {
            poemPlaceholder.classList.remove("hidden");
            errorPlaceholder.classList.add("hidden");
            const lines = data.poem.split('\n');
            authorElement.textContent = data.author;
            authorElement.classList.add('fade-in');
            titleElement.textContent = data.title;
            titleElement.classList.add('fade-in');
            lines.forEach(line => {
                const p = document.createElement('p');
                p.textContent = line;
                p.classList.add('fade-in');
                poemElement.appendChild(p);
            });
            setTimeout(() => {
                reloadBtn.classList.replace("hidden", "inline-flex");
                shareBtn.classList.replace("hidden", "inline-flex");
            }, 2000);
            sUrlElement.textContent = `https://poesis.preview.davidweis.eu/?share=${data.id}`
        }

        async function fetchRandomPoem() {
            if (shareParam !== null) {
                const url = new URL(window.location.href);
                url.searchParams.delete("share");
                window.history.replaceState({}, '', url.toString());
            }
            try {
                const response = await fetch('/data/poem/random');
                if (!response.ok) {
                    displayHTTPError(response.status);
                    return
                }
                const data = await response.json();
                setPoem(data);
            } catch (error) {
                console.error(error);
                if (error instanceof TypeError) {
                    displayOfflineError();
                }
            }
        }

        async function fetchPoem() {
            try {
                const response = await fetch(`/data/poem/${shareParam}`);
                if (!response.ok) {
                    displayHTTPError(response.status);
                    return
                }
                const data = await response.json();
                setPoem(data);
            } catch (error) {
                console.error(error);
                if (error instanceof TypeError) {
                    displayOfflineError();
                }
            }
        }

        function loadPoem() {
            if (shareParam !== null) {
                fetchPoem();
            } else {
                fetchRandomPoem();
            }
        }

        loadPoem();

        setTimeout(() => {
            sidepaneElement.classList.remove("hidden");
        }, 5000);

        reloadBtn.addEventListener("click", (event) => {
            reloadBtn.classList.replace("inline-flex", "hidden");
            shareBtn.classList.replace("inline-flex", "hidden");
            authorElement.textContent = "";
            authorElement.classList.remove('fade-in');
            titleElement.textContent = "";
            titleElement.classList.remove('fade-in');
            poemElement.textContent = "";
            fetchRandomPoem();
        });

        retryBtn.addEventListener("click", (event) => {
            loadPoem();
        });

        shareBtn.addEventListener("click", (event) => {
            shareDialogElement.classList.remove("hidden");
        });

        shareDialogCloseBtn.addEventListener("click", (event) => {
            shareDialogElement.classList.add("hidden");
            shareDialogCopyBtn.textContent = "Copy";
        });

        shareDialogCopyBtn.addEventListener("click", async (event) => {
            try {
                await navigator.clipboard.writeText(sUrlElement.textContent);
                shareDialogCopyBtn.textContent = "Copied";
            } catch (error) {
                console.error(error);
            }
        });
    </script>

</body>
</html>
