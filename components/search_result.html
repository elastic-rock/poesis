<a href="/{{author_slug}}/{{title_slug}}" class="w-max rounded-2xl border-transparent border-2 hover:border-white p-4">
    <div class="flex flex-col">
        <p class="text-2xl hover:underline decoration-from-font">{{title}}</p>
        <p class="text-lg font-light hover:underline decoration-from-font">{{author}}</p>
    </div>
    <div class="relative mt-3 overflow-hidden">
        <div class="absolute inset-0 z-20 bg-gradient-to-b from-transparent from-50% to-neutral-900"></div>
        <div class="relative z-10 -indent-8 ps-8">{{poem}}</div>
    </div>
</a>
